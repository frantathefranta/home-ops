---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: beets-backup
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
  - name: rook-ceph-cluster
    namespace: rook-ceph-external
  values:
    controllers:
      beets-backup:
        type: cronjob
        cronjob:
          schedule: "@daily"
          timeZone: America/Detroit
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 1
        containers:
          app:
            image:
              repository: ghcr.io/restic/restic
              tag: 0.19.1@sha256:2f0373803493361f9304a57150d464677f69a9dad487afec202105aafb2592f2
            envFrom:
            - secretRef:
                name: beets-secret
            command:
              - /bin/sh
              - -c
              - |
                restic backup --verbose /music/stereo --group-by 'paths' && restic forget --keep-daily 1 --keep-weekly 1 --keep-monthly 6 --prune --group-by 'paths'
            resources:
              requests:
                cpu: 10m
                memory: 250Mi
              limits:
                cpu: 1000m
                memory: 1Gi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 1003
        fsGroup: 1003
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups: [10000]
        seccompProfile: { type: RuntimeDefault }

    persistence:
      music:
        type: nfs
        server: ${NAS_IP}
        path: /emc1/music
        globalMounts:
        - path: /music
      tmp:
        type: emptyDir
      cache:
        existingClaim: beets-restic-cache
        globalMounts:
          - path: /.cache
