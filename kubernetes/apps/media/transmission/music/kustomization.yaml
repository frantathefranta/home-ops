---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./helmrelease.yaml
  - ./networkpolicy.yaml
  - ./externalsecret.yaml
configMapGenerator:
  - name: transmission-loki-rules
    files:
      - transmission.yaml=./resources/lokirule.yaml
    options:
      labels:
        loki_rule: "true"
  - name: transmission-music-scripts
    files:
      - transmission-complete.sh=./resources/transmission-complete.sh
generatorOptions:
  disableNameSuffixHash: true
