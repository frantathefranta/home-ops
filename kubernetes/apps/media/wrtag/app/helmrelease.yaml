# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/helm.toolkit.fluxcd.io/helmrelease_v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app wrtag
spec:
  interval: 30m
  maxHistory: 3
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: -1
  uninstall:
    keepHistory: false
  driftDetection:
    mode: warn
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 1003
        fsGroup: 1003
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

    controllers:
      wrtag:
        defaultContainerOptions:
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]

        containers:
          app:
            image:
              repository: ghcr.io/frantathefranta/wrtag
              tag: master@sha256:aaf2ccfbbd09df419a368594a636c09a66e964f6e8891ad97a1b180b1c29ee85
            env:
              WRTAG_WEB_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: wrtag
                    key: api_key
              WRTAG_WEB_LISTEN_ADDR: ":80"
              WRTAG_WEB_PUBLIC_URL: https://wrtag.franta.us
              WRTAG_WEB_DB_PATH: /data/wrtag.db
              WRTAG_LOG_LEVEL: debug
              WRTAG_PATH_FORMAT:
                valueFrom:
                  configMapKeyRef:
                    name: wrtag-config
                    key: path_format

            # probes:
            #   liveness: &probes
            #     enabled: true
            #     custom: true
            #     spec:
            #       httpGet:
            #         path: /
            #         port: 80
            #       initialDelaySeconds: 0
            #       periodSeconds: 10
            #       timeoutSeconds: 1
            #       failureThreshold: 3
            #   readiness: *probes
            #   startup:
            #     enabled: false

            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi

    service:
      app:
        controller: *app
        ports:
          http:
            port: &http 80

    route:
      app:
        hostnames: ["wrtag.franta.us"]
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *http

    persistence:
      data:
        existingClaim: *app
      media:
        type: nfs
        server: ${NAS_IP}
        path: /emc1/music
        globalMounts:
          - path: /music
      tmp:
        type: emptyDir
