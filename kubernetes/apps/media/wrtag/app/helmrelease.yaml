# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/helm.toolkit.fluxcd.io/helmrelease_v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app wrtag
spec:
  interval: 30m
  maxHistory: 3
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: -1
  uninstall:
    keepHistory: false
  driftDetection:
    mode: warn
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1003
        fsGroup: 1003
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

    controllers:
      wrtag:
        defaultContainerOptions:
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/sentriz/wrtag
              tag: v0.30.0@sha256:71829ef1ebec03e012343bc02036d3c566acf1c3f34de3fc552675c4525046f4
            env:
              WRTAG_WEB_LISTEN_ADDR: ":80"
              WRTAG_WEB_PUBLIC_URL: https://wrtag.franta.us
              WRTAG_WEB_DB_PATH: /data/wrtag.db
              WRTAG_LOG_LEVEL: debug
              WRTAG_KEEP_FILE: "origin.yaml"
              WRTAG_PATH_FORMAT:
                valueFrom:
                  configMapKeyRef:
                    name: wrtag-config
                    key: path_format
            envFrom:
              - secretRef:
                  name: wrtag-secret
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi

    service:
      app:
        controller: *app
        ports:
          http:
            port: &http 80

    route:
      app:
        hostnames: ["wrtag.franta.us"]
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *http

    persistence:
      data:
        existingClaim: *app
      media:
        type: nfs
        server: ${NAS_IP}
        path: /emc1/music
        globalMounts:
          - path: /music
      tmp:
        type: emptyDir
