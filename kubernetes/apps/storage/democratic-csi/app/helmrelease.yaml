---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: democratic-csi-iscsi
  namespace: storage
spec:
  interval: 1h
  chart:
    spec:
      chart: democratic-csi
      version: 0.15.1
      sourceRef:
        kind: HelmRepository
        name: democratic-csi-charts
        namespace: storage
  values:
    csiDriver:
      name: "org.democratic-csi.zfs-iscsi"
      installCRD: true

    driver:
      config:
        driver: zfs-generic-iscsi
        sshConnection:
          host: 10.33.100.1
          port: 22
          username: admin
        zfs:
          cli:
            sudoEnabled: true
          datasetParentName: test/k8s/test
          detachedSnapshotsDatasetParentName: test/k8s/test-snapshots
        iscsi:
          shareStrategy: "targetCli"
          shareStrategyTargetCli:
            sudoEnabled: true
            basename: "iqn.1993-08.org.debian:01:e7ee99cbcaa"
            tpg:
              attributes:
                authentication: 0
                generate_node_acls: 1
                demo_mode_write_protect: 0
          namePrefix: "csi-"
          nameSuffix: "-cluster"
          targetPortal: "10.33.100.1:3260"

    controller:
      driver:
        image:
          registry: ghcr.io/democratic-csi/democratic-csi
          tag: v1.9.5@sha256:fc3b7d7ed3a616714139525075312758e23a5d425ffb539ad12c9bd20fb6001f
      annotations:
        reloader.stakater.com/auto: "true"

    node:
      hostPID: true
      driver:
        image:
          registry: ghcr.io/democratic-csi/democratic-csi
          tag: v1.9.5@sha256:fc3b7d7ed3a616714139525075312758e23a5d425ffb539ad12c9bd20fb6001f
        extraEnv:
          - name: ISCSIADM_HOST_STRATEGY
            value: nsenter
          - name: ISCSIADM_HOST_PATH
            value: /usr/local/sbin/iscsiadm
        iscsiDirHostPath: /var/iscsi
        iscsiDirHostPathType: ""

    csiProxy:
      image:
        registry: ghcr.io/democratic-csi/csi-grpc-proxy
        tag: v0.5.7@sha256:0240d0fba3cedd598036766b1865e88aa2eac9c16822df03d5d912a81128ebb6

    storageClasses:
      - name: zfs-iscsi
        defaultClass: false
        reclaimPolicy: Delete
        volumeBindingMode: Immediate
        allowVolumeExpansion: true
        parameters:
          fsType: ext4

    # volumeSnapshotClasses:
    #   - name: zfs-iscsi
    #     deletionPolicy: Delete
  valuesFrom:
    - kind: Secret
      name: zfs-generic-iscsi-secret
      valuesKey: privateKey
      targetPath: driver.config.sshConnection.privateKey
